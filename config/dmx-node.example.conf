# DTTD DMX / Spotify player node config

PORTAL_BASE=https://dj.dancethruthedecades.co.uk/api
SECRET=DMX_NODE_SECRET_7f2c9e4a1b8d6f0c3e5a9d7b2f4c8e1

NODE_KEY=dmx-desk-a
DISPLAY_NAME=DMX Deck A
SPOTIFY_NAME=DMX Deck A

# Local music / MPD playback
LOCAL_MUSIC_MOUNT=/mnt/dttd-music
MPD_HOST=localhost
MPD_PORT=6600

# HDMI display kiosk control
# Full mode is the richer animated display; lite is recommended for low-memory Raspberry Pis.
DISPLAY_URL_FULL=https://live.dancethruthedecades.co.uk/
DISPLAY_URL_LITE=https://live.dancethruthedecades.co.uk/?mode=lite
# Leave blank to auto-detect. Use /usr/lib/chromium/chromium on low-memory Pis to bypass launcher prompts.
DISPLAY_BROWSER=
DISPLAY_PROFILE_BASE=/home/disco/.config/dttd-display-chromium
DISPLAY_LOG=/tmp/dttd-display.log
